name: Deploy
on:
  release:
    types: [published]
concurrency:
  group: deploy-production
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: toolforge
    steps:
      - uses: actions/checkout@v6
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.4
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          port: 22
          request_pty: true
          command_timeout: 20m
          key: ${{ secrets.KEY }}
          script: |
            become wikivisage bash -c "
              set -e
              toolforge build start https://github.com/DiFronzo/WikiVisage.git
              toolforge jobs run migrate --command 'python migrate.py' --image tool-wikivisage/tool-wikivisage:latest --wait
              curl -fsSL https://raw.githubusercontent.com/DiFronzo/WikiVisage/${{ github.event.release.tag_name }}/jobs.yaml -o /tmp/jobs.yaml
              toolforge jobs load /tmp/jobs.yaml
              toolforge webservice buildservice restart
            "