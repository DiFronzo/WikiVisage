name: Deploy
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to deploy (e.g. v0.2.5)"
        required: true
concurrency:
  group: deploy-production
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: toolforge
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          if [ -z "$SSH_HOST" ] || [ -z "$SSH_KEY" ] || [ -z "$SSH_USER" ]; then
            echo "::error::Missing required secrets (HOST, KEY, USERNAME). Configure them in the 'toolforge' environment."
            exit 1
          fi
          mkdir -p ~/.ssh
          ssh-keyscan "$SSH_HOST" >> ~/.ssh/known_hosts
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
        env:
          SSH_HOST: ${{ secrets.HOST }}
          SSH_KEY: ${{ secrets.KEY }}
          SSH_USER: ${{ secrets.USERNAME }}
      - name: Deploy to Toolforge
        timeout-minutes: 20
        env:
          TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
        run: |
          set -euo pipefail

          if [ -z "${TAG:-}" ]; then
            echo "::error::TAG is empty. Provide a valid tag (e.g. v0.2.5)."
            exit 1
          fi

          if ! [[ "$TAG" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "::error::Invalid tag '$TAG'. Allowed characters: A-Z, a-z, 0-9, '.', '_', '-'."
            exit 1
          fi

          cat > /tmp/deploy.sh << 'SCRIPT'
          set -euo pipefail
          TAG="$1"
          echo "==> Building image from ref $TAG"
          toolforge build start --ref "$TAG" https://github.com/DiFronzo/WikiVisage.git 2>&1 | tail -5
          echo "==> Waiting for build to complete..."
          ELAPSED=0
          while [ $ELAPSED -lt 600 ]; do
            sleep 15
            ELAPSED=$((ELAPSED + 15))
            STATUS=$(toolforge build show --json 2>/dev/null | jq -r '.build.status // empty')
            if [ -z "$STATUS" ]; then
              echo "Waiting... (${ELAPSED}s) no status yet"
              continue
            fi
            case "$STATUS" in
              ok)
                echo "Build succeeded after ${ELAPSED}s"
                break
                ;;
              error|timeout)
                echo "Build failed with status: $STATUS"
                toolforge build show
                toolforge build logs 2>&1 | tail -20
                exit 1
                ;;
              cancelled)
                echo "Build was cancelled"
                exit 1
                ;;
              pending|running|unknown)
                echo "Waiting... (${ELAPSED}s) status: $STATUS"
                ;;
              *)
                echo "Waiting... (${ELAPSED}s) unexpected status: $STATUS"
                ;;
            esac
          done
          if [ $ELAPSED -ge 600 ]; then
            echo "Build timed out after 600s"
            toolforge build show
            exit 1
          fi
          echo "==> Running migration"
          toolforge jobs run migrate --command "python migrate.py" --image tool-wikivisage/tool-wikivisage:latest --wait
          echo "==> Loading jobs.yaml"
          curl -fsSL "https://raw.githubusercontent.com/DiFronzo/WikiVisage/${TAG}/jobs.yaml" -o /tmp/jobs.yaml
          toolforge jobs load /tmp/jobs.yaml
          echo "==> Restarting webservice"
          toolforge webservice buildservice restart
          echo "==> Deploy complete"
          SCRIPT

          scp -i ~/.ssh/id_ed25519 /tmp/deploy.sh "${{ secrets.USERNAME }}@${{ secrets.HOST }}":/tmp/deploy.sh
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.USERNAME }}@${{ secrets.HOST }}" \
            "become wikivisage bash /tmp/deploy.sh '${TAG}'"
      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/id_ed25519
